<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #e5ddd5; margin: 0; }
        #login-box, #chat-box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 320px; box-sizing: border-box; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #128c7e; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 12px; border-radius: 6px; background: #f9f9f9; }
        .msg-p { margin: 8px 0; padding: 6px 10px; border-radius: 5px; background: #fff; box-shadow: 0 1px 1px rgba(0,0,0,0.1); width: fit-content; max-width: 80%; }
        .my-msg { background: #dcf8c6; margin-left: auto; }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-box">
        <h2 style="text-align: center; margin-top: 0; color: #075e54;">Private Chat</h2>
        <input type="text" id="username" placeholder="Username / ID">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>

    <!-- 2. CHAT SCREEN -->
    <div id="chat-box" class="hidden">
        <h3 style="margin-top: 0; color: #075e54;">Logged in as: <span id="user-display"></span></h3>
        <div id="messages"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="margin: 0;">
            <button onclick="sendMessage()" style="width: auto; padding: 0 20px;">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        // Login Function
        async function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(!user || !pass) {
                alert("Please enter both ID and Password!");
                return;
            }

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

            if(data.success) {
                myName = user;
                document.getElementById('user-display').innerText = myName;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('chat-box').classList.remove('hidden');
            } else {
                alert("Wrong ID or Password! Please try again.");
            }
        }

        // Send Message Function
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                socket.emit('chat message', { user: myName, msg: input.value });
                input.value = "";
            }
        }

        // Enter key click chesthe send avvadaniki
        document.getElementById('msg-input').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMessage();
        });

        // Receive Message Function
        socket.on('chat message', (data) => {
            const msgDiv = document.getElementById('messages');
            const isMe = data.user === myName;
            
            // Text align custom styles kosam
            msgDiv.innerHTML += `<div class="msg-p ${isMe ? 'my-msg' : ''}">
                                    <strong>${data.user}:</strong> ${data.msg}
                                 </div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight; // Auto scroll down
        });
    </script>
</body>
</html>
