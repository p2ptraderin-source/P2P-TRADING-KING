<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P TERMINAL PRO</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Mobile Screen Fixes */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100%; 
            width: 100%; 
            background: #0b0e11; 
            color: #eaecef; 
            font-family: sans-serif; 
            overflow: hidden; 
            position: fixed; /* Prevents bouncing */
        }

        #login-screen { position: fixed; inset: 0; background: #0b0e11; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .login-box { background: #1e2329; padding: 25px; border-radius: 12px; border: 1px solid #f3ba2f; width: 100%; max-width: 320px; text-align: center; }
        
        /* Layout Fix: Using 100dvh for dynamic mobile height */
        #chat-screen { 
            display: none; 
            flex-direction: column; 
            height: 100dvh; 
            width: 100%; 
        }

        header { background: #1e2329; padding: 12px; text-align: center; color: #f3ba2f; font-weight: bold; border-bottom: 1px solid #474d57; flex-shrink: 0; }
        
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #0b0e11;
            -webkit-overflow-scrolling: touch;
        }

        .msg { background: #1e2329; padding: 10px; border-radius: 10px; max-width: 85%; align-self: flex-start; border-left: 4px solid #0ecb81; word-wrap: break-word; }
        .user-name { color: #f3ba2f; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .msg img { max-width: 100%; border-radius: 6px; margin-top: 5px; display: block; border: 1px solid #444; }

        .footer { 
            background: #1e2329; 
            padding: 10px; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #474d57; 
            flex-shrink: 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* iOS Notch Fix */
        }

        input[type="text"] { flex: 1; background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; }
        .gold-btn { background: #f3ba2f; color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cam-btn { background: #474d57; border: none; padding: 10px; border-radius: 8px; color: white; font-size: 20px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#f3ba2f; margin-bottom:15px;">P2P ACCESS</h2>
            <input type="text" id="u" placeholder="Username" style="width:100%; margin-bottom:10px;">
            <input type="password" id="p" placeholder="Password" style="width:100%; margin-bottom:15px;">
            <button class="gold-btn" style="width:100%" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="chat-screen">
        <header>SECURE P2P TERMINAL</header>
        <div id="messages"></div>
        <div class="footer">
            <input type="file" id="f" accept="image/*" style="display:none">
            <button class="cam-btn" onclick="document.getElementById('f').click()">📷</button>
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button class="gold-btn" onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        const users = { "P2P TRADER KING👑": "63743", "CUSTOMER NO 447": "CN 447" };

        function login() {
            const user = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value.trim();
            if(users[user] === pass) {
                myName = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                scrollToBottom();
            } else { alert("Invalid Credentials!"); }
        }

        function scrollToBottom() {
            const area = document.getElementById('messages');
            area.scrollTop = area.scrollHeight;
        }

        function render(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            if(data.isAutoReply) div.style.borderLeftColor = "#f3ba2f";
            
            let contentHTML = data.type === 'text' ? `<div>${data.content}</div>` : `<img src="${data.content}">`;
            div.innerHTML = `<div class="user-name">${data.user}</div>${contentHTML}`;
            
            document.getElementById('messages').appendChild(div);
            scrollToBottom();
        }

        function send() {
            const val = document.getElementById('m').value;
            if(val) {
                socket.emit('chat message', { user: myName, type: 'text', content: val });
                document.getElementById('m').value = '';
            }
        }

        socket.on('load history', (h) => { 
            document.getElementById('messages').innerHTML = ""; 
            h.forEach(render); 
        });

        socket.on('chat message', render);

        document.getElementById('f').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                socket.emit('chat message', { user: myName, type: 'img', content: ev.target.result });
            };
            reader.readAsDataURL(file);
        };

        // Keyboard show fix
        document.getElementById('m').addEventListener('focus', () => {
            setTimeout(scrollToBottom, 300);
        });

        document.getElementById('m').addEventListener("keypress", (e) => { if(e.key==="Enter") send(); });
    </script>
</body>
</html>
