<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P TERMINAL</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: #0b0e11; color: #eaecef; font-family: sans-serif; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: #0b0e11; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .login-box { background: #1e2329; padding: 25px; border-radius: 12px; border: 1px solid #f3ba2f; width: 100%; max-width: 320px; text-align: center; }
        
        #chat-screen { display: none; flex-direction: column; height: 100vh; width: 100%; }
        header { background: #1e2329; padding: 15px; text-align: center; color: #f3ba2f; font-weight: bold; border-bottom: 1px solid #474d57; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0b0e11; }
        .msg { background: #1e2329; padding: 12px; border-radius: 10px; max-width: 85%; align-self: flex-start; border-left: 4px solid #0ecb81; word-wrap: break-word; }
        .user-name { color: #f3ba2f; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        img { max-width: 100%; border-radius: 6px; margin-top: 8px; display: block; }

        input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; }
        .gold-btn { background: #f3ba2f; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .footer { background: #1e2329; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #474d57; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#f3ba2f; margin-bottom:15px;">P2P LOGIN</h2>
            <input type="text" id="u" placeholder="Username" style="width:100%; margin-bottom:10px;">
            <input type="password" id="p" placeholder="Password" style="width:100%; margin-bottom:15px;">
            <button class="gold-btn" style="width:100%" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="chat-screen">
        <header>SECURE P2P TERMINAL</header>
        <div id="messages"></div>
        <div class="footer">
            <input type="file" id="f" accept="image/*" style="display:none">
            <button onclick="document.getElementById('f').click()" style="background:#474d57; border:none; padding:10px; border-radius:8px; color:white;">📷</button>
            <input type="text" id="m" placeholder="Message..." style="flex:1" autocomplete="off">
            <button class="gold-btn" onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        const users = { "P2P TRADER KING👑": "63743", "CUSTOMER NO 447": "CN 447" };

        function login() {
            const user = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value.trim();
            if(users[user] === pass) {
                myName = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            } else { alert("Wrong Credentials!"); }
        }

        function render(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            if(data.isAutoReply) div.style.borderLeftColor = "#f3ba2f";
            let html = data.type === 'text' ? `<div>${data.content}</div>` : `<img src="${data.content}">`;
            div.innerHTML = `<div class="user-name">${data.user}</div>${html}`;
            const area = document.getElementById('messages');
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function send() {
            const val = document.getElementById('m').value;
            if(val) {
                socket.emit('chat message', { user: myName, type: 'text', content: val });
                document.getElementById('m').value = '';
            }
        }

        socket.on('load history', (h) => { document.getElementById('messages').innerHTML = ""; h.forEach(render); });
        socket.on('chat message', render);

        document.getElementById('f').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { socket.emit('chat message', { user: myName, type: 'img', content: ev.target.result }); };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('m').addEventListener("keypress", (e) => { if(e.key==="Enter") send(); });
    </script>
</body>
</html>
